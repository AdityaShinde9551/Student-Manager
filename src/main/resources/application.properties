# ==============================
# App Config
# ==============================
spring.application.name=student-manager
server.port=8080

# ==============================
# Supabase PostgreSQL Database
# ==============================
spring.datasource.url=jdbc:postgresql://YOUR-HOST.supabase.com:6543/postgres?sslmode=require
spring.datasource.username=postgres.YOUR-PROJECT-ID
spring.datasource.password=YOUR-PASSWORD

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# "update" = adds new columns (marks fields) without deleting existing data
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==============================
# Thymeleaf
# ==============================
spring.thymeleaf.cache=false
