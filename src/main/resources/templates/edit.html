<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Student | Student Manager</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
        }

        .navbar {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 { font-size: 20px; }

        .container {
            max-width: 680px;
            margin: 36px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .card h2 {
            font-size: 18px;
            color: #1e3c72;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e8eef5;
        }

        .section-label {
            font-size: 13px;
            font-weight: 600;
            color: #2a5298;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 20px 0 12px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #444;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2a5298;
        }

        /* Marks grid — 2 columns */
        .marks-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .marks-grid .form-group { margin-bottom: 0; }

        /* Max marks hint */
        .form-group .hint {
            font-size: 11px;
            color: #aaa;
            margin-top: 4px;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn-save {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-save:hover { opacity: 0.88; }

        .btn-cancel {
            flex: 1;
            padding: 12px;
            background: white;
            color: #555;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn-cancel:hover { background: #f5f5f5; }
    </style>
</head>
<body>

<div class="navbar">
    <h1>🎓 Student Manager</h1>
</div>

<div class="container">
    <div class="card">
        <h2>✏️ Edit Student</h2>

        <form th:action="@{/students/edit/{id}(id=${student.id})}"
              th:object="${student}" method="post">

            <!-- Basic Info -->
            <p class="section-label">Basic Information</p>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" th:field="*{name}" required />
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" th:field="*{email}" required />
            </div>

            <div class="form-group">
                <label>Course / Branch</label>
                <input type="text" th:field="*{course}" required />
            </div>

            <!-- Marks -->
            <p class="section-label">Subject Marks (out of 100 each)</p>

            <div class="marks-grid">

                <div class="form-group">
                    <label>Java Programming</label>
                    <input type="number" th:field="*{marksJava}"
                           min="0" max="100" required />
                    <p class="hint">Max: 100</p>
                </div>

                <div class="form-group">
                    <label>Web Technology</label>
                    <input type="number" th:field="*{marksWeb}"
                           min="0" max="100" required />
                    <p class="hint">Max: 100</p>
                </div>

                <div class="form-group">
                    <label>Operating System</label>
                    <input type="number" th:field="*{marksOs}"
                           min="0" max="100" required />
                    <p class="hint">Max: 100</p>
                </div>

                <div class="form-group">
                    <label>Transform &amp; Numerical Methods</label>
                    <input type="number" th:field="*{marksTnm}"
                           min="0" max="100" required />
                    <p class="hint">Max: 100</p>
                </div>

                <div class="form-group">
                    <label>Theory of Computation</label>
                    <input type="number" th:field="*{marksToc}"
                           min="0" max="100" required />
                    <p class="hint">Max: 100</p>
                </div>

            </div>

            <!-- Buttons -->
            <div class="btn-row">
                <button type="submit" class="btn-save">Save Changes</button>
                <a th:href="@{/dashboard}" class="btn-cancel">Cancel</a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
